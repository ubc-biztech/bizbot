name: lint

on:
  pull_request:
    branches: [main, dev]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen
      - name: Typecheck
        run: uv run pyright

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ruff check --fix
        run: uv run ruff check --fix .

      - name: Run ruff format
        run: uv run ruff format .

      - name: Commit formatting changes
        uses: autofix-ci/action@v1
        with:
          commit-message: "style: format with ruff"
